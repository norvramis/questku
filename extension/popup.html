<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:280px;background:rgba(30,31,34,.92);color:#e8eaed;font:13px/1.5 Inter,-apple-system,BlinkMacSystemFont,sans-serif;padding:20px;user-select:none;-webkit-backdrop-filter:blur(24px);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.08)}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;color:#f0f2f5;letter-spacing:.2px;margin-bottom:2px}
.logo span{color:#545ded}
.desc{font-size:11.5px;color:rgba(255,255,255,.35);margin-bottom:14px;line-height:1.4;padding-left:28px}
.status{font-size:11.5px;color:rgba(255,255,255,.4);margin-bottom:14px;padding:8px 10px;background:rgba(255,255,255,.04);border-radius:8px;border:1px solid rgba(255,255,255,.06);transition:all .15s}
.status.ok{color:#23a55a;border-color:rgba(35,165,90,.2);background:rgba(35,165,90,.06)}
.status.err{color:#f23f42;border-color:rgba(242,63,66,.2);background:rgba(242,63,66,.06)}
.btn{width:100%;padding:9px 0;background:linear-gradient(135deg,#545ded,#6b7dff);color:#fff;border:0;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.btn:hover{opacity:.9;box-shadow:0 4px 15px rgba(84,93,237,.25)}
.btn:disabled{opacity:.25;cursor:not-allowed;box-shadow:none}
.ft{font-size:10.5px;color:rgba(255,255,255,.25);text-align:center;margin-top:12px;line-height:1.4}
</style>
</head>
<body>
<div class="logo"><svg width="18" height="18" viewBox="0 0 48 48"><rect width="48" height="48" rx="10" fill="#545ded"/><text x="24" y="33" text-anchor="middle" fill="#fff" font-size="28" font-weight="700" font-family="Inter,sans-serif">Q</text></svg>Quest<span>ku</span></div>
<div class="desc">Automatically enroll, complete, and claim Discord quests.</div>
<div class="status" id="q-status">Status: Ready</div>
<button class="btn" id="q-inject">Questku</button>
<div class="ft" id="q-ft">Open discord.com in your browser</div>
</body>
<script src="popup.js"></script>
</html>
